<svg width="1200" height="200" viewBox="0 0 1200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="readme-header-bg-clip"><rect width="1200" height="200"/></clipPath>
    <!-- Raindrop wallpaper (same structure as waterline.svg) -->
    <pattern id="raindrop-wallpaper" x="0" y="0" width="176" height="176" patternUnits="userSpaceOnUse">
      <g stroke-linecap="round" stroke-linejoin="round" fill="none">
        <g opacity="0.22" transform="translate(24 20) scale(2.2)">
          <path d="M7.502 19.423c2.602 2.105 6.395 2.105 8.996 0c2.602 -2.105 3.262 -5.708 1.566 -8.546l-4.89 -7.26c-.42 -.625 -1.287 -.803 -1.936 -.397a1.376 1.376 0 0 0 -.41 .397l-4.893 7.26c-1.695 2.838 -1.035 6.441 1.567 8.546" stroke="#9BE7F2" stroke-width="1.45"/>
