<svg width="600" height="56" viewBox="0 760 1024 264" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Water fill (bottom strip) -->
    <linearGradient id="water-fill-strip" x1="0" y1="760" x2="0" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4DD0E1"/>
      <stop offset="0.5" stop-color="#00C6E0"/>
      <stop offset="1" stop-color="#00BCD4"/>
    </linearGradient>
  </defs>
  <!-- Base: dark blue background for full-width strip -->
  <rect x="-20" y="760" width="1064" height="264" fill="#0B2649"/>
  <!-- Bottom: water strip (same wave shape as main waterline background) -->
  <path d="M-20,768 C180,736 380,800 512,768 S844,736 1044,768 L1044,1024 L-20,1024 Z" fill="url(#water-fill-strip)"/>
  <!-- Wave lines in water strip -->
  <path d="M0,853 Q160,838 320,853 T640,853 T960,853 L1024,853" fill="none" stroke="#00BCD4" stroke-width="1.5" stroke-opacity="0.4"/>
  <path d="M0,938 Q120,925 240,938 T480,938 T720,938 T960,938 L1024,938" fill="none" stroke="#4DD0E1" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Waterline stroke (horizon) -->
  <path d="M-20,768 C180,736 380,800 512,768 S844,736 1044,768" fill="none" stroke="#00A4BA" stroke-width="2.5" stroke-opacity="0.5" stroke-linecap="round"/>
</svg>

