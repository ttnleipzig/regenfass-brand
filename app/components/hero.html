<!-- Hero Section – all text white on dark background -->
<header role="banner" class="hero-section relative bg-navy-900 py-16 px-4 text-white" style="background-image: url('{{basePath}}backgrounds/5.svg'); background-size: cover; background-position: center;">
    <div class="max-w-6xl mx-auto relative z-10">
        <!-- Title -->
        <h1 class="font-heading text-4xl md:text-5xl lg:text-6xl font-bold mb-4">
            {{heroTitle}}
        </h1>

        <!-- Subtitle -->
        <p class="font-body text-lg md:text-xl text-white mb-4 max-w-2xl">
            {{heroSubtitle}}
        </p>
    </div>
</header>
