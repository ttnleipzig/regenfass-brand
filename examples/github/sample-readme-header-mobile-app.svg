<svg width="1200" height="200" viewBox="0 0 1200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="readme-header-bg-clip"><rect width="1200" height="200"/></clipPath>
    <linearGradient id="readme-header-overlay" x1="0" x2="1" y1="0" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#0B2649" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#0B2649" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background: waterline -->
  <g clip-path="url(#readme-header-bg-clip)">
    <image href="../../assets/backgrounds/waterline.svg" x="0" y="0" width="1200" height="200" preserveAspectRatio="xMidYMid slice"/>
  </g>
  <!-- Overlay: left 50% → right 0% transparency (behind logo and text) -->
  <rect width="1200" height="200" fill="url(#readme-header-overlay)"/>
  <!-- Regenfass logo -->
  <g transform="translate(40, 24)" fill="none">
    <g stroke="#00BCD4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" transform="scale(2.4)">
      <path d="M5 16l1.465 1.638a2 2 0 1 1 -3.015 .099l1.55 -1.737" />
      <path d="M13.737 9.737c2.299 -2.3 3.23 -5.095 2.081 -6.245c-1.15 -1.15 -3.945 -.217 -6.244 2.082c-2.3 2.299 -3.231 5.095 -2.082 6.244c1.15 1.15 3.946 .218 6.245 -2.081" />
      <path d="M7.492 11.818c.362 .362 .768 .676 1.208 .934l6.895 4.047c1.078 .557 2.255 -.075 3.692 -1.512c1.437 -1.437 2.07 -2.614 1.512 -3.692c-.372 -.718 -1.72 -3.017 -4.047 -6.895a6.015 6.015 0 0 0 -.934 -1.208" />
    </g>
    <text x="62" y="42" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#FFFFFF">Regenfass</text>
  </g>
  <!-- Title (system UI stack) -->
  <text x="40" y="130" font-family="system-ui, sans-serif" font-size="32" font-weight="700" fill="#FFFFFF">Mobile App</text>
  <!-- Accent line (brand accent as in OG) -->
  <rect x="40" y="148" width="200" height="4" fill="#00BCD4"/>
