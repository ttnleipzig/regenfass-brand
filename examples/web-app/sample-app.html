<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Regenfass – Beispielanwendung</title>
  <style>
    /* Brand: Navy #0B2649, Turquoise #00BCD4, Green #22C55E; on-dark: #4DD0E1, #4ADE80 */
    :root {
      --navy: #0B2649;
      --navy-bg: #1E2A45;
      --aqua: #00BCD4;
      --aqua-on-dark: #4DD0E1;
      --green: #22C55E;
      --green-on-dark: #4ADE80;
      --bg: #f5f5f5;
      --surface: #ffffff;
      --text: #333333;
      --text-muted: #666666;
      --border: #e5e7eb;
    }

    html.dark {
      --bg: #0B2649;
      --surface: #1E2A45;
      --text: #e1e1e1;
      --text-muted: #b0b0b0;
      --border: #2d3a52;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.4;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .app-header {
      background: var(--navy);
      color: #fff;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .app-header .brand { font-weight: 700; font-size: 1.1rem; }
    .app-nav { display: flex; gap: 1rem; }
    .app-nav a {
      color: var(--aqua-on-dark);
      text-decoration: none;
    }
    .app-nav a:hover { text-decoration: underline; }

    .app-main { padding: 1rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .card h3 {
      margin: 0 0 0.5rem 0;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }
    .card p {
      margin: 0 0 0.75rem 0;
      color: var(--text-muted);
      font-size: 0.875rem;
    }
    .btn {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.875rem;
      text-decoration: none;
      border: none;
      cursor: pointer;
    }
    .btn-primary {
      background: var(--aqua);
      color: var(--navy);
    }
    .btn-secondary {
      background: var(--navy);
      color: #fff;
    }
    html.dark .btn-primary {
      background: var(--aqua-on-dark);
      color: var(--navy);
    }
    html.dark .btn-secondary {
      background: var(--surface);
      color: var(--aqua-on-dark);
      border: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <header class="app-header">
    <span class="brand">Regenfass</span>
    <nav class="app-nav">
      <a href="#dashboard">Dashboard</a>
      <a href="#projekte">Projekte</a>
      <a href="#einstellungen">Einstellungen</a>
    </nav>
  </header>
  <main class="app-main">
    <div class="card">
      <h3>Willkommen</h3>
      <p>Diese Beispielanwendung zeigt die Regenfass-Brand in einer Web-App – nutzbar im Light- und Dark-Mode.</p>
      <button type="button" class="btn btn-primary">Starten</button>
    </div>
    <div class="card">
      <h3>Brand-Farben</h3>
      <p>Turquoise, Navy und Green werden konsistent für Buttons, Links und Akzente verwendet.</p>
      <button type="button" class="btn btn-secondary">Mehr erfahren</button>
    </div>
  </main>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      if (params.get('theme') === 'dark') {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</body>
</html>
